<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submittal Builder | AI Powered</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 1s ease-in-out;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .upload-area:hover .upload-icon {
            transform: scale(1.1);
        }

        .file-label {
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .file-formats {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        #file-name-display {
            display: block;
            margin-top: 1rem;
            color: #818cf8;
            font-weight: 600;
            font-size: 0.95rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
        }
        
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            display: none;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        .success-accent {
            color: #10b981;
        }

        .error-accent {
            color: #ef4444;
        }

        a.download-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            text-decoration: none;
            border: 1px solid #10b981;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        a.download-btn:hover {
            background: #10b981;
            color: #111827;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Submittal Builder</h1>
        <p class="subtitle">AI-powered workflow automation for engineering BOMs</p>
        
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="upload-area" id="drop-zone">
                <span class="upload-icon">📄</span>
                <div class="file-label">Drag & drop your BOM file here</div>
                <div class="file-formats">or click to browse (.pdf, .csv, .txt up to 5MB)</div>
                <input type="file" id="file" name="file" accept=".pdf,.txt,.csv" required>
                <div id="file-name-display"></div>
            </div>
            <button type="submit" id="submitBtn">Generate Submittal</button>
        </form>
        
        <div id="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('file');
        const fileNameDisplay = document.getElementById('file-name-display');
        const dropZone = document.getElementById('drop-zone');

        // File input change handler
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileNameDisplay.textContent = `Selected: ${e.target.files[0].name}`;
            } else {
                fileNameDisplay.textContent = '';
            }
        });

        // Drag and drop effects
        ['dragover', 'dragenter'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });
        });

        ['dragleave', 'dragend', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                dropZone.classList.remove('dragover');
            });
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            if (fileInput.files.length === 0) return;
            
            // UI state
            submitBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = '<span class="loading-spinner"></span>Uploading and analyzing...';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = `<span class="loading-spinner"></span>Building submittal (Job ID: ${data.job_id.substring(0,8)})...`;
                    pollStatus(data.job_id);
                } else {
                    submitBtn.disabled = false;
                    statusDiv.innerHTML = `<span class="error-accent">Error: ${data.detail || data.message}</span>`;
                }
            } catch (error) {
                submitBtn.disabled = false;
                statusDiv.innerHTML = `<span class="error-accent">Error: ${error.message}</span>`;
            }
        });

        async function pollStatus(jobId) {
            const statusDiv = document.getElementById('status');
            const submitBtn = document.getElementById('submitBtn');
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${jobId}`);
                    const data = await response.json();
                    
                    if (data.status === 'completed') {
                        clearInterval(interval);
                        statusDiv.innerHTML = `
                            <div class="success-accent">✨ Package successfully generated!</div>
                            <div style="font-size: 0.9rem; color: #94a3b8; margin-top: 5px;">
                                Processed ${data.total_parts} unique parts
                            </div>
                            <a href="/api/download/${jobId}" class="download-btn">📥 Download Submittal ZIP</a>
                        `;
                        submitBtn.disabled = false;
                    } else if (data.status === 'failed') {
                        clearInterval(interval);
                        statusDiv.innerHTML = `<span class="error-accent">Processing failed: ${data.error_message}</span>`;
                        submitBtn.disabled = false;
                    }
                } catch(err) {
                    // keep polling on temporary fetch error
                }
            }, 2000);
        }
    </script>
</body>
</html>
